<svg width="200" height="50" viewBox="0 0 200 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Chart/Graph icon representing growth and data analysis -->
  <g transform="translate(10, 8)">
    <!-- Background circle -->
    <circle cx="15" cy="17" r="14" fill="#f0f9ff" stroke="#0284c7" stroke-width="1.5"/>
    
    <!-- Upward trending bars -->
    <rect x="8" y="20" width="3" height="8" fill="#0284c7" rx="1"/>
    <rect x="12" y="16" width="3" height="12" fill="#0ea5e9" rx="1"/>
    <rect x="16" y="12" width="3" height="16" fill="#38bdf8" rx="1"/>
    <rect x="20" y="8" width="3" height="20" fill="#0284c7" rx="1"/>
    
    <!-- Upward arrow accent -->
    <path d="M 21 10 L 24 7 L 21 7 Z" fill="#f97316"/>
  </g>
  
  <!-- ProofLabs text -->
  <text x="38" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#111827">ProofLabs</text>
  <text x="38" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="500" fill="#6b7280" letter-spacing="0.5">MAXIMIZE EVERY DOLLAR</text>
</svg>
